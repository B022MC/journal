name: Copy Redis Image
on: workflow_dispatch

permissions:
  contents: read
  packages: write

jobs:
  copy-image:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Pull and Push
        run: |
          docker pull redis:7-alpine
          docker tag redis:7-alpine ghcr.io/b022mc/journal-redis:7-alpine
          docker push ghcr.io/b022mc/journal-redis:7-alpine
