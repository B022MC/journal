name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_OWNER: b022mc

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run backend regression tests
        run: go test ./api/... ./rpc/paper/... ./model

      - name: Run API contract tests
        run: make api-contract-test

      - name: Run search benchmark gate
        run: BENCHTIME=1x make search-bench

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend build
        run: npx next build --webpack

      - name: Run frontend smoke
        run: npm run smoke

  build-backend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: api
            target: api
          - name: user-rpc
            target: user-rpc
          - name: paper-rpc
            target: paper-rpc
          - name: rating-rpc
            target: rating-rpc
          - name: news-rpc
            target: news-rpc
          - name: lifecycle
            target: lifecycle
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: ${{ matrix.service.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/journal-${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/journal-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/journal-frontend:latest
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/journal-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Load manifests
        id: manifests
        run: |
          content=$(cat backend/deploy/k8s/namespace.yaml)
          for f in backend/deploy/k8s/*.yaml; do
            if [ "$f" != "backend/deploy/k8s/namespace.yaml" ]; then
              content="$content\n---\n$(cat "$f")"
            fi
          done
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo -e "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: root
          password: ${{ secrets.K3S_PASSWORD }}
          script: |
            set -e

            export OWNER="${{ env.REPO_OWNER }}"
            export SHA="${{ github.sha }}"
            export REGISTRY="${{ env.REGISTRY }}"

            k3s kubectl apply -f - <<'INFRA'
            ${{ steps.manifests.outputs.content }}
            INFRA

            k3s kubectl -n journal set image deployment/journal-api \
              journal-api=${REGISTRY}/${OWNER}/journal-api:${SHA}
            k3s kubectl -n journal set image deployment/user-rpc \
              user-rpc=${REGISTRY}/${OWNER}/journal-user-rpc:${SHA}
            k3s kubectl -n journal set image deployment/paper-rpc \
              paper-rpc=${REGISTRY}/${OWNER}/journal-paper-rpc:${SHA}
            k3s kubectl -n journal set image deployment/rating-rpc \
              rating-rpc=${REGISTRY}/${OWNER}/journal-rating-rpc:${SHA}
            k3s kubectl -n journal set image deployment/news-rpc \
              news-rpc=${REGISTRY}/${OWNER}/journal-news-rpc:${SHA}
            k3s kubectl -n journal set image deployment/frontend \
              frontend=${REGISTRY}/${OWNER}/journal-frontend:${SHA}

            k3s kubectl -n journal rollout status deployment/journal-api --timeout=120s
            k3s kubectl -n journal rollout status deployment/frontend --timeout=120s

            echo "Deployment complete."
