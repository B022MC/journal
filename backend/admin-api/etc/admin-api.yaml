Name: admin-api
Host: 0.0.0.0
Port: 8889

Auth:
  AccessSecret: "admin-jwt-secret-key-2026"
  AccessExpire: 259200  # 72 hours

BizDB:
  ReadWriteSplit: false
  DataSource: "journal:banishmentB022.@tcp(127.0.0.1:13306)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

AdminDB:
  ReadWriteSplit: false
  DataSource: "journal:banishmentB022.@tcp(127.0.0.1:13306)/journal_admin?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

Redis:
  Host: 127.0.0.1:16379
