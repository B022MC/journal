Name: news.rpc
ListenOn: 0.0.0.0:9004
Etcd:
  Hosts:
    - 127.0.0.1:12379
  Key: news.rpc

DB:
  ReadWriteSplit: true
  DataSource: "journal:banishmentB022.@tcp(127.0.0.1:13306)/journal?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
  Policy: round-robin
  Replicas:
    - "journal:banishmentB022.@tcp(127.0.0.1:13307)/journal?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
    - "journal:banishmentB022.@tcp(127.0.0.1:13308)/journal?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

Redis:
  Host: 127.0.0.1:16379
  Type: node
  Pass: "banishmentB022."

Telemetry:
  Name: news.rpc
  Endpoint: http://127.0.0.1:4318
  Batcher: otlphttp

Prometheus:
  Host: 0.0.0.0
  Port: 9104
  Path: /metrics
