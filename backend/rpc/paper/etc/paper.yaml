Name: paper.rpc
ListenOn: 0.0.0.0:9002
Etcd:
  Hosts:
    - 127.0.0.1:12379
  Key: paper.rpc

DB:
  DataSource: "journal:journal123@tcp(127.0.0.1:13306)/journal?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
  Policy: round-robin
  Replicas:
    - "journal:journal123@tcp(127.0.0.1:13307)/journal?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
    - "journal:journal123@tcp(127.0.0.1:13308)/journal?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

Telemetry:
  Name: paper.rpc
  Endpoint: http://127.0.0.1:4318
  Batcher: otlphttp

Prometheus:
  Host: 0.0.0.0
  Port: 9102
  Path: /metrics
