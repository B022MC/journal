Name: paper.rpc
ListenOn: 0.0.0.0:9002
Etcd:
  Hosts:
    - 127.0.0.1:12379
  Key: paper.rpc

BizDB:
  ReadWriteSplit: true
  DataSource: "journal:banishmentB022.@tcp(127.0.0.1:13306)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
  Policy: round-robin
  Replicas:
    - "journal:banishmentB022.@tcp(127.0.0.1:13307)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
    - "journal:banishmentB022.@tcp(127.0.0.1:13308)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

Redis:
  Host: 127.0.0.1:16379
  Type: node
  Pass: "banishmentB022."

Search:
  # Keep FULLTEXT as the safe release default until the hybrid gate in the
  # rollout runbook and search ADR is explicitly signed off.
  DefaultEngine: fulltext
  ShadowCompare: false
  QueryTimeoutMs: 150
  BuildTimeoutMs: 5000
  MaxDocuments: 10000
  BatchOne:
    Enabled: true
    WorkerCount: 4
    Explain: true
    EnableIK: true
    EnableJieba: true
    # Optional line-delimited custom phrases, merged with the built-in lexicon.
    LexiconPath: ""
  BatchTwo:
    TrieEnabled: true
    SynonymEnabled: true
    # Optional JSON object: {"term":["alias1","alias2"]}.
    SynonymPath: ""
    FusionEnabled: true
    FusionBM25Weight: 0.75
    FusionFreshnessWeight: 0.15
    FusionQualityWeight: 0.10

Telemetry:
  Name: paper.rpc
  Endpoint: http://127.0.0.1:4318
  Batcher: otlphttp

Prometheus:
  Host: 0.0.0.0
  Port: 9102
  Path: /metrics
