Name: rating.rpc
ListenOn: 0.0.0.0:9003
Etcd:
  Hosts:
    - 127.0.0.1:12379
  Key: rating.rpc

BizDB:
  ReadWriteSplit: true
  DataSource: "journal:banishmentB022.@tcp(127.0.0.1:13306)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
  Policy: round-robin
  Replicas:
    - "journal:banishmentB022.@tcp(127.0.0.1:13307)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
    - "journal:banishmentB022.@tcp(127.0.0.1:13308)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

Redis:
  Host: 127.0.0.1:16379
  Type: node
  Pass: "banishmentB022."

Telemetry:
  Name: rating.rpc
  Endpoint: http://127.0.0.1:4318
  Batcher: otlphttp

Prometheus:
  Host: 0.0.0.0
  Port: 9103
  Path: /metrics
