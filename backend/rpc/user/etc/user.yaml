Name: user.rpc
ListenOn: 0.0.0.0:9001
Etcd:
  Hosts:
    - 127.0.0.1:12379
  Key: user.rpc

BizDB:
  ReadWriteSplit: true
  DataSource: "journal:journal123@tcp(127.0.0.1:13306)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
  Policy: round-robin
  Replicas:
    - "journal:journal123@tcp(127.0.0.1:13307)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
    - "journal:journal123@tcp(127.0.0.1:13308)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

JwtSecret: "journal-jwt-secret-key-2026"
JwtExpireHrs: 72

Telemetry:
  Name: user.rpc
  Endpoint: http://127.0.0.1:4318
  Batcher: otlphttp

Prometheus:
  Host: 0.0.0.0
  Port: 9101
  Path: /metrics
