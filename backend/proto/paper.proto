syntax = "proto3";

package paper;
option go_package = "./paper";

message SubmitPaperReq {
  string title = 1;
  string title_en = 2;
  string abstract = 3;
  string abstract_en = 4;
  string content = 5;
  int64 author_id = 6;
  string author_name = 7;
  string discipline = 8;   // science, humanities, information, technology, other
  string keywords = 9;
  string file_path = 10;
}

message PaperItem {
  int64 id = 1;
  string title = 2;
  string title_en = 3;
  string abstract = 4;
  string abstract_en = 5;
  string content = 6;
  int64 author_id = 7;
  string author_name = 8;
  string discipline = 9;
  string zone = 10;         // latrine, septic_tank, stone, sediment
  double shit_score = 11;
  double avg_rating = 12;
  int32 rating_count = 13;
  int32 view_count = 14;
  double controversy_index = 15;
  string doi = 16;
  string keywords = 17;
  string file_path = 18;
  int64 created_at = 19;
  int64 promoted_at = 20;
}

message ListPapersReq {
  string zone = 1;
  string discipline = 2;
  string sort = 3;          // highest_rated, most_rated, newest
  int32 page = 4;
  int32 page_size = 5;
}

message ListPapersResp {
  repeated PaperItem items = 1;
  int64 total = 2;
}

message GetPaperReq {
  int64 id = 1;
}

message GetPaperResp {
  PaperItem paper = 1;
}

message SubmitPaperResp {
  int64 id = 1;
  string doi = 2;
}

message UpdateZoneReq {
  int64 id = 1;
  string zone = 2;
}

message SearchPapersReq {
  string query = 1;
  string discipline = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message UserPapersReq {
  int64 author_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message CommonResp {
  bool success = 1;
  string message = 2;
}

service Paper {
  rpc SubmitPaper(SubmitPaperReq) returns (SubmitPaperResp);
  rpc GetPaper(GetPaperReq) returns (GetPaperResp);
  rpc ListPapers(ListPapersReq) returns (ListPapersResp);
  rpc SearchPapers(SearchPapersReq) returns (ListPapersResp);
  rpc UpdateZone(UpdateZoneReq) returns (CommonResp);
  rpc UserPapers(UserPapersReq) returns (ListPapersResp);
  rpc IncrViewCount(GetPaperReq) returns (CommonResp);
}
