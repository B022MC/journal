syntax = "proto3";

package user;
option go_package = "./user";

message RegisterReq {
  string username = 1;
  string email = 2;
  string password = 3;
  string nickname = 4;
}

message LoginReq {
  string username = 1;
  string password = 2;
}

message UserInfoReq {
  int64 user_id = 1;
}

message UpdateProfileReq {
  int64 user_id = 1;
  string nickname = 2;
  string avatar = 3;
}

message UserInfo {
  int64 id = 1;
  string username = 2;
  string email = 3;
  string nickname = 4;
  string avatar = 5;
  int32 role = 6;
  string contribution_score = 7;
  int64 created_at = 8;
}

message RegisterResp {
  int64 id = 1;
}

message LoginResp {
  int64 id = 1;
  string token = 2;
  int64 expire_at = 3;
  UserInfo user_info = 4;
}

message UserInfoResp {
  UserInfo user_info = 1;
}

message CommonResp {
  bool success = 1;
  string message = 2;
}

service User {
  rpc Register(RegisterReq) returns (RegisterResp);
  rpc Login(LoginReq) returns (LoginResp);
  rpc GetUserInfo(UserInfoReq) returns (UserInfoResp);
  rpc UpdateProfile(UpdateProfileReq) returns (CommonResp);
}
