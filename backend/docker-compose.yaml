version: '3.8'

networks:
  journal:
    driver: bridge

services:
  # === MySQL Master (写) ===
  mysql-master:
    container_name: journal-mysql-master
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: journal_biz
      MYSQL_USER: journal
      MYSQL_PASSWORD: journal123
      TZ: Asia/Shanghai
    volumes:
      - ./model/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - ./deploy/mysql/master.cnf:/etc/mysql/conf.d/master.cnf
      - journal-mysql-master-data:/var/lib/mysql
    ports:
      - "13306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - journal
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # === MySQL Replica 1 (读) ===
  mysql-replica1:
    container_name: journal-mysql-replica1
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: journal_biz
      MYSQL_USER: journal
      MYSQL_PASSWORD: journal123
      TZ: Asia/Shanghai
    volumes:
      - ./model/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - ./deploy/mysql/replica1.cnf:/etc/mysql/conf.d/replica.cnf
      - journal-mysql-replica1-data:/var/lib/mysql
    ports:
      - "13307:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - journal
    depends_on:
      mysql-master:
        condition: service_healthy

  # === MySQL Replica 2 (读) ===
  mysql-replica2:
    container_name: journal-mysql-replica2
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: journal_biz
      MYSQL_USER: journal
      MYSQL_PASSWORD: journal123
      TZ: Asia/Shanghai
    volumes:
      - ./model/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - ./deploy/mysql/replica2.cnf:/etc/mysql/conf.d/replica.cnf
      - journal-mysql-replica2-data:/var/lib/mysql
    ports:
      - "13308:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - journal
    depends_on:
      mysql-master:
        condition: service_healthy

  redis:
    container_name: journal-redis
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass redis123456
    ports:
      - "16379:6379"
    volumes:
      - journal-redis-data:/data
    networks:
      - journal

  etcd:
    container_name: journal-etcd
    image: quay.io/coreos/etcd:v3.5.12
    restart: always
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_API: "3"
    ports:
      - "12379:2379"
    networks:
      - journal

  # === Jaeger (全链路追踪) ===
  jaeger:
    container_name: journal-jaeger
    image: jaegertracing/all-in-one:1.54
    restart: always
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
    networks:
      - journal

  # === Prometheus (指标采集) ===
  prometheus:
    container_name: journal-prometheus
    image: prom/prometheus:v2.49.0
    restart: always
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - journal-prometheus-data:/prometheus
    ports:
      - "19090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - journal

  # === Grafana (可视化仪表盘) ===
  grafana:
    container_name: journal-grafana
    image: grafana/grafana:10.3.0
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "13000:3000"
    volumes:
      - journal-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - journal

volumes:
  journal-mysql-master-data:
  journal-mysql-replica1-data:
  journal-mysql-replica2-data:
  journal-redis-data:
  journal-prometheus-data:
  journal-grafana-data:
