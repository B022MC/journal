apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-rpc
  namespace: journal
  labels:
    app: admin-rpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-rpc
  template:
    metadata:
      labels:
        app: admin-rpc
    spec:
      containers:
        - name: admin-rpc
          image: docker.io/library/journal-admin-rpc:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9005
          volumeMounts:
            - name: config
              mountPath: /app/etc/admin.yaml
              subPath: admin.yaml
      nodeSelector:
        kubernetes.io/hostname: vm-0-16-centos
      tolerations:
        - key: "node.kubernetes.io/network-unavailable"
          operator: "Exists"
          effect: "NoSchedule"
      volumes:
        - name: config
          configMap:
            name: admin-rpc-config
---
apiVersion: v1
kind: Service
metadata:
  name: admin-rpc
  namespace: journal
spec:
  type: ClusterIP
  selector:
    app: admin-rpc
  ports:
    - port: 9005
      targetPort: 9005
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-rpc-config
  namespace: journal
data:
  admin.yaml: |
    Name: admin.rpc
    ListenOn: 0.0.0.0:9005
    Etcd:
      Hosts:
        - etcd.journal.svc.cluster.local:2379
      Key: admin.rpc

    BizDB:
      ReadWriteSplit: false
      DataSource: "journal:banishmentB022.@tcp(mysql.journal.svc.cluster.local:3306)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

    AdminDB:
      ReadWriteSplit: false
      DataSource: "journal:banishmentB022.@tcp(mysql.journal.svc.cluster.local:3306)/journal_admin?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

    Telemetry:
      Name: admin.rpc
      Endpoint: http://jaeger.journal.svc.cluster.local:4318
      Batcher: otlphttp

    Prometheus:
      Host: 0.0.0.0
      Port: 9105
      Path: /metrics
