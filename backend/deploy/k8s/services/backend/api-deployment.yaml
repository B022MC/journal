apiVersion: apps/v1
kind: Deployment
metadata:
  name: journal-api
  namespace: journal
  labels:
    app: journal-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: journal-api
  template:
    metadata:
      labels:
        app: journal-api
    spec:
      containers:
        - name: journal-api
          image: ghcr.io/b022mc/journal-api:latest
          ports:
            - containerPort: 8888
          volumeMounts:
            - name: config
              mountPath: /app/etc/journal-api.yaml
              subPath: journal-api.yaml
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: journal-api-config
---
apiVersion: v1
kind: Service
metadata:
  name: journal-api
  namespace: journal
spec:
  type: NodePort
  selector:
    app: journal-api
  ports:
    - port: 8888
      targetPort: 8888
      nodePort: 30888
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: journal-api-config
  namespace: journal
data:
  journal-api.yaml: |
    Name: journal-api
    Host: 0.0.0.0
    Port: 8888

    Auth:
      AccessSecret: "journal-jwt-secret-key-2026"
      AccessExpire: 259200

    BizDB:
      ReadWriteSplit: false
      DataSource: "journal:banishmentB022.@tcp(mysql.journal.svc.cluster.local:3306)/journal_biz?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

    AdminDB:
      ReadWriteSplit: false
      DataSource: "journal:banishmentB022.@tcp(mysql.journal.svc.cluster.local:3306)/journal_admin?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

    Redis:
      Host: redis.journal.svc.cluster.local:6379
      Type: node
      Pass: "banishmentB022."

    Telemetry:
      Name: journal-api
      Endpoint: http://jaeger.journal.svc.cluster.local:4318
      Batcher: otlphttp

    Prometheus:
      Host: 0.0.0.0
      Port: 9105
      Path: /metrics

    UserRpc:
      Etcd:
        Hosts:
          - etcd.journal.svc.cluster.local:2379
        Key: user.rpc
      Timeout: 3000
      NonBlock: true

    PaperRpc:
      Etcd:
        Hosts:
          - etcd.journal.svc.cluster.local:2379
        Key: paper.rpc
      Timeout: 3000
      NonBlock: true

    RatingRpc:
      Etcd:
        Hosts:
          - etcd.journal.svc.cluster.local:2379
        Key: rating.rpc
      Timeout: 3000
      NonBlock: true

    NewsRpc:
      Etcd:
        Hosts:
          - etcd.journal.svc.cluster.local:2379
        Key: news.rpc
      Timeout: 3000
      NonBlock: true
