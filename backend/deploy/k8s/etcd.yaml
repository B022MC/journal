apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: journal
  labels:
    app: etcd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: ghcr.io/b022mc/coreos/etcd:v3.5.12
          env:
            - name: ETCD_LISTEN_CLIENT_URLS
              value: "http://0.0.0.0:2379"
            - name: ETCD_ADVERTISE_CLIENT_URLS
              value: "http://etcd.journal.svc.cluster.local:2379"
            - name: ALLOW_NONE_AUTHENTICATION
              value: "yes"
            - name: ETCD_API
              value: "3"
          ports:
            - containerPort: 2379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: journal
spec:
  type: ClusterIP
  selector:
    app: etcd
  ports:
    - port: 2379
      targetPort: 2379
